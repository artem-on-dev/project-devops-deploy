- hosts: production
  become: true
  vars:
    # docker config
    docker_packages_state: present
    docker_users:
      - devops

    # nginx config
    nginx_vhosts:
      - listen: "80"
        server_name: "devops-3.sytes.net www.devops-3.sytes.net"
        extra_parameters: |
          location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt
          }
          return 301 https://$host$request_uri;

      - listen: "443 ssl"
        ssl_protocols: "TLSv1.2 TLSv1.3"
        ssl_ciphers: "HIGH:!aNULL:!MD5"
        server_name: "devops-3.sytes.net"
        server_name_redirect: "www.devops-3.sytes.net"
        ssl_certificate: /etc/letsencrypt/live/devops-3.sytes.net/fullchain.pem
        ssl_certificate_key: /etc/letsencrypt/live/devops-3.sytes.net/privkey.pem

        extra_parameters: |
          location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://localhost:8080;
          }
          location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico|woff2)$ {

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://localhost:8080;
            expires 1d;
          }
    # SSL Cert config
    certbot_auto_renew: true
    certbot_create_method: standalone
    certbot_create_standalone_stop_services:
      - nginx
    certbot_webroot: /var/www/letsencrypt
    certbot_create_if_missing: true
    certbot_certs:
      - domains:
          - devops-3.sytes.net
    certbot_auto_renew_options: "--webroot -w /var/www/letsencrypt --deploy-hook 'systemctl reload nginx'"

    ports:
      - "32223" # custom SSH port
      - "80"
      - "443"

  roles:
    - geerlingguy.docker
    - geerlingguy.certbot
    - geerlingguy.nginx
    # TODO: Add S3 bucket provisioning role (e.g. s3_bucket) before deploy
    - deploy

  tasks:
    - name: Configure firewall
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
      loop: "{{ ports }}"

    - name: Enable firewall
      community.general.ufw:
        state: enabled
        default: deny
