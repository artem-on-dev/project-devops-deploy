app_name: bulletins

docker_registry_repo: artemstepanenko
docker_container: bulletins
docker_image: "{{ docker_registry_repo }}/{{ app_name }}:{{ image_tag }}"
image_tag: "latest"

app_port: 8080
app_base_dir: "/opt/{{ app_name }}"
tmp_path: "{{ app_base_dir}}/tmp"
log_path: "{{ app_base_dir}}/log"
